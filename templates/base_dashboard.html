<!DOCTYPE html>
<html>
<head>
    <title>User Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            /* Loading the image from your static folder */
            background: url("/static/images/bg.jpg") no-repeat center center fixed;
            background-size: cover;
            background-color: #f5f7fa; /* Fallback color */
        }
    
        .sidebar {
            height: 100vh;
            background: linear-gradient(180deg, #111, #222);
            color: white;
            padding: 20px;
            position: fixed;
            width: 240px;
        }
    
        .sidebar h4 {
            margin-bottom: 30px;
        }
    
        .sidebar a {
            display: block;
            padding: 10px;
            color: #ccc;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 5px;
        }
    
        .sidebar a:hover {
            background-color: #333;
            color: white;
        }
    
        .main-content {
            margin-left: 240px;
            padding: 30px;
        }
    
        .topbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
    
        .card-custom {
            border: none;
            border-radius: 15px;
            padding: 20px;
            color: white;
        }
    
        .bg1 { background: linear-gradient(45deg, #667eea, #764ba2); }
        .bg2 { background: linear-gradient(45deg, #43cea2, #185a9d); }
        .bg3 { background: linear-gradient(45deg, #ff512f, #dd2476); }
        .bg4 { background: linear-gradient(45deg, #11998e, #38ef7d); }
    
        .card-custom h3 {
            font-size: 28px;
        }
    </style>
</head>
<body>

<div class="sidebar">

    <a href="{% url 'dashboard' %}">Notebook</a>
    <a href="{% url 'predict' %}">Predict</a>
    <a href="{% url 'history' %}">History</a>
    <a href="{% url 'profile' %}">Profile</a>
    <a href="{% url 'logout' %}">Logout</a>
</div>

<div class="main-content">

    <div class="topbar d-flex justify-content-between">
        <h5>Welcome, {{ request.user.username }}</h5>
        <span>AI System Status: <b class="text-success">Active</b></span>
    </div>

    {% block content %}{% endblock %}

</div>

</body>
</html>
